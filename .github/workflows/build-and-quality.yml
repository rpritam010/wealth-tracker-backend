name: Build and Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: |
        cd wealthManagement
        mvn clean package -DskipTests
    
    - name: Run Tests (Skip DB Tests)
      run: |
        cd wealthManagement
        mvn test -DskipTests
    
    - name: Run Code Analysis - Checkstyle
      run: |
        cd wealthManagement
        mvn checkstyle:check
      continue-on-error: true
    
    - name: Generate Test Report
      if: always()
      run: |
        cd wealthManagement
        mvn surefire-report:report
      continue-on-error: true
    
    - name: Archive Build Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-results
        path: |
          wealthManagement/target/
          wealthManagement/target/surefire-reports/
        retention-days: 30
    
    - name: Archive Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: wealthManagement/target/site/
        retention-days: 30
